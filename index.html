<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f7f7f5" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#111110" media="(prefers-color-scheme: dark)">
<meta name="description" content="Generate clean QR codes instantly. Free, no watermark, no sign-up.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>QRcraft — QR codes that just work</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --bg: #f7f7f5;
  --surface: #ffffff;
  --surface2: #f0efec;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.14);
  --ink: #111110;
  --ink2: #6f6e6b;
  --ink3: #a8a7a3;
  --accent: #111110;
  --accent-fg: #ffffff;
  --focus: rgba(0,0,0,0.12);
  --radius: 14px;
  --radius-lg: 20px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.06);
  --shadow-lg: 0 2px 8px rgba(0,0,0,0.06), 0 24px 64px rgba(0,0,0,0.1);
  --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg: #111110;
  --surface: #1c1c1a;
  --surface2: #232320;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.12);
  --ink: #f0efe9;
  --ink2: #9a9893;
  --ink3: #5a5956;
  --accent: #f0efe9;
  --accent-fg: #111110;
  --focus: rgba(255,255,255,0.1);
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.3);
  --shadow-lg: 0 2px 8px rgba(0,0,0,0.4), 0 24px 64px rgba(0,0,0,0.5);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100dvh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background var(--transition), color var(--transition);
  line-height: 1.5;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; }

/* ── NAV ── */
.nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  height: 56px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  transition: background var(--transition), border-color var(--transition);
}
@supports (padding: max(0px)) {
  .nav { padding-left: max(24px, env(safe-area-inset-left)); padding-right: max(24px, env(safe-area-inset-right)); }
}

.logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 15px; font-weight: 600; letter-spacing: -0.3px;
  color: var(--ink); text-decoration: none;
  user-select: none;
}
.logo-mark {
  width: 24px; height: 24px; border-radius: 6px;
  background: var(--ink); display: flex; align-items: center; justify-content: center;
  transition: background var(--transition);
}
.logo-mark svg { fill: var(--bg); transition: fill var(--transition); }

.nav-right { display: flex; align-items: center; gap: 8px; }

.theme-btn {
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all var(--transition);
  flex-shrink: 0;
}
.theme-btn:hover { border-color: var(--border-strong); color: var(--ink); background: var(--surface2); }
.theme-btn:active { transform: scale(0.93); }
.theme-btn svg { width: 16px; height: 16px; }
.icon-sun { display: none; }
[data-theme="dark"] .icon-moon { display: none; }
[data-theme="dark"] .icon-sun { display: block; }

/* ── MAIN LAYOUT ── */
.main {
  max-width: 480px; margin: 0 auto;
  padding: 40px 20px 80px;
  display: flex; flex-direction: column; gap: 24px;
}
@supports (padding: max(0px)) {
  .main {
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    padding-bottom: max(80px, env(safe-area-inset-bottom));
  }
}
@media (max-width: 520px) { .main { padding-top: 28px; gap: 18px; } }

/* ── HERO TEXT ── */
.hero { text-align: center; padding: 8px 0 4px; }
.hero h1 {
  font-size: clamp(26px, 6vw, 34px);
  font-weight: 600; letter-spacing: -0.8px; line-height: 1.15;
  color: var(--ink);
}
.hero p {
  margin-top: 8px; font-size: 14px;
  color: var(--ink2); line-height: 1.6;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
}

/* ── TYPE PILLS ── */
.type-bar {
  display: flex; gap: 4px; padding: 12px 12px 0;
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.type-bar::-webkit-scrollbar { display: none; }

.type-pill {
  flex-shrink: 0;
  padding: 6px 14px; border-radius: 99px;
  font-size: 12px; font-weight: 500; letter-spacing: 0.01em;
  border: 1px solid transparent;
  color: var(--ink2);
  background: transparent;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  font-family: inherit;
  display: flex; align-items: center; gap: 5px;
}
.type-pill:hover { color: var(--ink); background: var(--surface2); }
.type-pill.active {
  background: var(--ink); color: var(--accent-fg);
  border-color: var(--ink);
}
.type-pill.active:hover { opacity: 0.88; }

/* ── INPUTS ── */
.input-area { padding: 12px 16px 16px; }

.field { display: flex; flex-direction: column; gap: 6px; }
.field + .field { margin-top: 10px; }

label {
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink3);
}

input[type="text"], input[type="url"],
input[type="email"], input[type="tel"],
input[type="password"], textarea {
  width: 100%;
  padding: 11px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 15px;
  font-family: inherit;
  color: var(--ink);
  outline: none;
  transition: all var(--transition);
  -webkit-appearance: none;
  appearance: none;
  resize: none;
  line-height: 1.5;
}
input::placeholder, textarea::placeholder { color: var(--ink3); }
input:focus, textarea:focus {
  border-color: var(--border-strong);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--focus);
}

/* ── WIFI EXTRA ── */
.security-row {
  display: flex; gap: 6px;
}
.security-opt {
  flex: 1; padding: 9px 6px; text-align: center;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm, 10px);
  font-size: 12px; font-weight: 500; color: var(--ink2);
  cursor: pointer; background: var(--surface2);
  transition: all var(--transition); font-family: inherit;
}
.security-opt.active { border-color: var(--border-strong); color: var(--ink); background: var(--surface); }

/* ── GENERATE BTN ── */
.gen-wrap { padding: 0 16px 16px; }
.gen-btn {
  width: 100%; padding: 13px;
  background: var(--ink); color: var(--accent-fg);
  border: none; border-radius: var(--radius);
  font-size: 14px; font-weight: 500; letter-spacing: -0.1px;
  font-family: inherit; cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  position: relative; overflow: hidden;
}
.gen-btn:hover { opacity: 0.88; }
.gen-btn:active { transform: scale(0.98); opacity: 1; }
.gen-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

/* ── QR OUTPUT CARD ── */
.output-card {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  transition: all var(--transition);
  animation: cardIn 0.35s cubic-bezier(0.34,1.3,0.64,1) both;
}
.output-card.visible { display: block; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.qr-display {
  display: flex; flex-direction: column; align-items: center;
  padding: 32px 24px 24px; gap: 0;
  position: relative;
}

/* corner decorations */
.qr-display::before, .qr-display::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border-color: var(--border-strong);
  border-style: solid;
  transition: border-color var(--transition);
}
.qr-display::before { top: 16px; left: 16px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
.qr-display::after { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

#qr-wrap {
  border-radius: 12px; overflow: hidden;
  background: white;
  line-height: 0;
  transition: box-shadow var(--transition);
}
#qr-wrap canvas, #qr-wrap img { display: block !important; }

.qr-label {
  margin-top: 16px; font-size: 12px; color: var(--ink3);
  max-width: 280px; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── DIVIDER ── */
.output-divider {
  height: 1px; background: var(--border);
  margin: 0 16px;
  transition: background var(--transition);
}

/* ── DOWNLOAD ROW ── */
.dl-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  padding: 16px;
}

.dl-btn {
  padding: 11px 8px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--ink);
  font-size: 13px; font-weight: 500;
  font-family: inherit; cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  white-space: nowrap;
}
.dl-btn:hover { border-color: var(--border-strong); background: var(--surface); }
.dl-btn:active { transform: scale(0.97); }
.dl-btn.primary {
  background: var(--ink); color: var(--accent-fg);
  border-color: var(--ink); grid-column: 1 / -1;
}
.dl-btn.primary:hover { opacity: 0.88; }

/* ── META ROW ── */
.meta-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px 14px;
  font-size: 11px; color: var(--ink3);
}
.meta-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #22c55e; display: inline-block; margin-right: 5px;
  animation: pulse 2.5s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

/* ── FOOTER ── */
.site-footer {
  text-align: center; padding: 0 20px 32px;
  font-size: 12px; color: var(--ink3);
  display: flex; flex-direction: column; gap: 4px;
}
.site-footer a { color: var(--ink2); text-decoration: none; }
.site-footer a:hover { color: var(--ink); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--accent-fg);
  padding: 10px 20px; border-radius: 99px;
  font-size: 13px; font-weight: 400; letter-spacing: -0.1px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  opacity: 0; pointer-events: none;
  transition: all 0.3s cubic-bezier(0.34,1.3,0.64,1);
  white-space: nowrap; z-index: 999;
  font-family: inherit;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
@supports (bottom: env(safe-area-inset-bottom)) {
  .toast { bottom: calc(28px + env(safe-area-inset-bottom)); }
}

/* ── LOADING ── */
.loader {
  width: 20px; height: 20px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white; border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
[data-theme="dark"] .loader { border-color: rgba(0,0,0,0.3); border-top-color: var(--ink); }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── COPY FLASH ── */
@keyframes copyFlash {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.copying { animation: copyFlash 0.3s ease; }

/* ── RESPONSIVE ── */
@media (min-width: 640px) {
  .main { padding-top: 56px; }
  .hero h1 { font-size: 32px; }
  .dl-row { grid-template-columns: 1fr 1fr; }
  .dl-btn.primary { grid-column: 1; }
  .dl-btn.share { display: flex; }
}
@media (max-width: 380px) {
  .type-pill { padding: 6px 11px; font-size: 11.5px; }
  .hero h1 { font-size: 24px; }
}
</style>
</head>

<script>
/* ── THEME ── */
(function() {
  const saved = localStorage.getItem('qrcraft-theme');
  const sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', saved || sys);
})();

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('qrcraft-theme', next);
}

/* ── STATE ── */
let currentType = 'url';
let wifiSec = 'WPA';
let debounce;

/* ── TYPE SWITCH ── */
function setType(btn) {
  document.querySelectorAll('.type-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = btn.dataset.type;
  ['url','text','email','wifi','phone'].forEach(t => {
    document.getElementById('f-'+t).style.display = t === currentType ? '' : 'none';
  });
  checkEmpty();
  // focus first input
  setTimeout(() => {
    const first = document.querySelector(`#f-${currentType} input, #f-${currentType} textarea`);
    if(first) first.focus();
  }, 50);
}

/* ── SECURITY ── */
function setSec(btn) {
  document.querySelectorAll('.security-opt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  wifiSec = btn.dataset.sec;
  onInput();
}

/* ── GET CONTENT ── */
function getContent() {
  switch(currentType) {
    case 'url': {
      let v = document.getElementById('i-url').value.trim();
      if(v && !v.match(/^https?:\/\//i) && !v.startsWith('ftp://')) v = 'https://' + v;
      return v;
    }
    case 'text': return document.getElementById('i-text').value.trim();
    case 'email': {
      const e = document.getElementById('i-email').value.trim();
      const s = document.getElementById('i-subject').value.trim();
      if(!e) return '';
      return `mailto:${e}${s ? '?subject=' + encodeURIComponent(s) : ''}`;
    }
    case 'wifi': {
      const ssid = document.getElementById('i-ssid').value.trim();
      if(!ssid) return '';
      const pass = document.getElementById('i-wpass').value;
      return `WIFI:T:${wifiSec};S:${ssid};P:${pass};;`;
    }
    case 'phone': {
      const p = document.getElementById('i-phone').value.trim();
      return p ? `tel:${p.replace(/\s/g,'')}` : '';
    }
  }
  return '';
}

function getLabelText() {
  switch(currentType) {
    case 'url': return document.getElementById('i-url').value.trim() || '';
    case 'text': return document.getElementById('i-text').value.trim().slice(0,50) || '';
    case 'email': return document.getElementById('i-email').value.trim() || '';
    case 'wifi': return document.getElementById('i-ssid').value.trim() || '';
    case 'phone': return document.getElementById('i-phone').value.trim() || '';
  }
  return '';
}

/* ── INPUT HANDLER ── */
function onInput() {
  checkEmpty();
  clearTimeout(debounce);
  const content = getContent();
  if(content) debounce = setTimeout(generate, 420);
}

function checkEmpty() {
  const content = getContent();
  const btn = document.getElementById('gen-btn');
  const lbl = document.getElementById('btn-label');
  if(content) {
    btn.disabled = false;
    lbl.textContent = 'Generate QR code';
  } else {
    btn.disabled = true;
    lbl.textContent = 'Enter a value above';
  }
}

/* ── GENERATE ── */
let lastContent = '';

function generate() {
  const content = getContent();
  if(!content) return;
  if(content === lastContent) return;
  lastContent = content;

  const wrap = document.getElementById('qr-wrap');
  const size = Math.min(window.innerWidth - 96, 260);
  const pxSize = Math.max(size, 200);

  wrap.innerHTML = '';
  wrap.style.width = pxSize + 'px';
  wrap.style.height = pxSize + 'px';
  wrap.style.display = 'flex';
  wrap.style.alignItems = 'center';
  wrap.style.justifyContent = 'center';

  const spinner = document.createElement('div');
  spinner.className = 'loader';
  wrap.appendChild(spinner);

  const out = document.getElementById('output-card');
  out.classList.add('visible');

  setTimeout(() => {
    wrap.innerHTML = '';
    wrap.style.display = '';
    wrap.style.width = '';
    wrap.style.height = '';

    try {
      new QRCode(wrap, {
        text: content,
        width: pxSize,
        height: pxSize,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });

      document.getElementById('qr-label').textContent = getLabelText();
      document.getElementById('meta-info').textContent = pxSize + '×' + pxSize + 'px';

      // show share btn on mobile if available
      if(navigator.share) {
        document.getElementById('share-btn').style.display = 'flex';
      }

      // scroll into view smoothly
      out.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    } catch(e) {
      wrap.innerHTML = '<div style="padding:24px;text-align:center;font-size:13px;color:var(--ink2)">Could not generate QR.<br>Try a different input.</div>';
    }
  }, 180);
}

/* ── DOWNLOAD PNG ── */
function downloadPNG() {
  const canvas = document.querySelector('#qr-wrap canvas');
  if(!canvas) { toast('Generate a QR code first'); return; }
  const link = document.createElement('a');
  link.download = 'qrcraft.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  toast('Downloaded ✓');
}

/* ── COPY SVG ── */
function copyHex() {
  const canvas = document.querySelector('#qr-wrap canvas');
  if(!canvas) { toast('Generate a QR code first'); return; }
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${canvas.width}" height="${canvas.height}" viewBox="0 0 ${canvas.width} ${canvas.height}"><image href="${canvas.toDataURL('image/png')}" width="${canvas.width}" height="${canvas.height}"/></svg>`;
  navigator.clipboard.writeText(svg)
    .then(() => toast('SVG copied ✓'))
    .catch(() => toast('Try Download PNG instead'));
}

/* ── SHARE (mobile) ── */
async function shareQR() {
  const canvas = document.querySelector('#qr-wrap canvas');
  if(!canvas || !navigator.share) return;
  canvas.toBlob(async (blob) => {
    const file = new File([blob], 'qrcraft.png', { type: 'image/png' });
    try {
      await navigator.share({ title: 'My QR code', files: [file] });
    } catch(e) {
      if(e.name !== 'AbortError') toast('Sharing failed');
    }
  });
}

/* ── TOAST ── */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

/* ── KEYBOARD SHORTCUT ── */
document.addEventListener('keydown', e => {
  if((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    generate();
  }
});

/* ── INIT ── */
checkEmpty();
</script>
</body>
</html>
